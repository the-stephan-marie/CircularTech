<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error": "#ba1a1a",
              "surface-container-highest": "#e1e3e4",
              "on-error-container": "#93000a",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#edeeef",
              "on-secondary-fixed": "#001945",
              "surface-container-low": "#f3f4f5",
              "tertiary-fixed-dim": "#bdcabe",
              "on-secondary-fixed-variant": "#00429b",
              "secondary-fixed": "#d9e2ff",
              "on-secondary": "#ffffff",
              "outline-variant": "#becabb",
              "on-background": "#191c1d",
              "surface-dim": "#d9dadb",
              "on-tertiary-fixed-variant": "#3e4a41",
              "outline": "#6e7a6d",
              "background": "#f8f9fa",
              "primary-fixed-dim": "#72dc86",
              "on-secondary-container": "#002661",
              "surface-variant": "#e1e3e4",
              "surface-container-high": "#e7e8e9",
              "surface-bright": "#f8f9fa",
              "on-surface-variant": "#3e4a3e",
              "secondary": "#0858c8",
              "on-primary-fixed": "#002109",
              "surface": "#f8f9fa",
              "secondary-fixed-dim": "#b0c6ff",
              "on-primary-fixed-variant": "#005321",
              "on-primary-container": "#f7fff2",
              "tertiary": "#535f56",
              "inverse-surface": "#2e3132",
              "inverse-primary": "#72dc86",
              "tertiary-container": "#6b786e",
              "surface-tint": "#006e2e",
              "inverse-on-surface": "#f0f1f2",
              "tertiary-fixed": "#d9e6da",
              "primary": "#006b2d",
              "primary-fixed": "#8ef9a0",
              "on-primary": "#ffffff",
              "on-tertiary-fixed": "#131e17",
              "on-error": "#ffffff",
              "primary-container": "#0c873c",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
              "secondary-container": "#558dff",
              "on-tertiary-container": "#f6fff5",
              "on-surface": "#191c1d"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-800 shadow-sm dark:shadow-none">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-none">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-green-700 dark:text-green-500 transition-opacity hover:opacity-80" data-icon="recycling">recycling</span>
<h1 class="font-manrope font-bold text-lg tracking-tight text-on-surface">Waste Entry</h1>
</div>
<button class="active:scale-95 transition-transform">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400" data-icon="logout">logout</span>
</button>
</div>
</header>
<main class="pt-20 px-6 max-w-lg mx-auto">
<!-- New Entry Section Title -->
<div class="mb-8">
<h2 class="text-3xl font-extrabold font-headline tracking-tight text-on-surface">New Entry</h2>
<p class="text-on-surface-variant font-body text-sm mt-1">Log your environmental impact today.</p>
</div>
<div class="space-y-8">
<!-- WHAT DID YOU COLLECT? -->
<section>
<h3 class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-4">What did you collect?</h3>
<div class="grid grid-cols-2 gap-4">
<!-- Plastic Card -->
<button class="flex flex-col items-center justify-center p-6 bg-surface-container-lowest rounded-xl border-2 border-primary-container/20 shadow-sm transition-all active:scale-95 group">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mb-3 group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-primary group-hover:text-white" data-icon="water_bottle">water_bottle</span>
</div>
<span class="font-headline font-bold text-on-surface">plastic</span>
</button>
<!-- Organic Card -->
<button class="flex flex-col items-center justify-center p-6 bg-surface-container-lowest rounded-xl border-2 border-transparent shadow-sm transition-all active:scale-95 hover:border-primary-container/20 group">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center mb-3 group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="compost">compost</span>
</div>
<span class="font-headline font-bold text-on-surface">organic</span>
</button>
</div>
</section>
<!-- HOW MUCH (BUCKETS)? -->
<section>
<h3 class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-4">How much (Buckets)?</h3>
<div class="flex items-center justify-between bg-surface-container-lowest p-4 rounded-xl shadow-sm border border-outline-variant/10">
<button class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center active:scale-90 transition-all text-on-surface">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<div class="flex flex-col items-center">
<span class="text-4xl font-headline font-extrabold text-on-surface">3</span>
<span class="text-[10px] font-label font-bold uppercase tracking-tighter text-on-surface-variant">Buckets</span>
</div>
<button class="w-12 h-12 rounded-full bg-primary text-white flex items-center justify-center active:scale-90 transition-all shadow-md shadow-primary/20">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</section>
<!-- LOCATION -->
<section>
<h3 class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-4">Location</h3>
<button class="w-full flex items-center justify-between px-5 py-4 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 active:scale-[0.98] transition-all">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
<span class="font-body text-on-surface-variant">Tap to select</span>
</div>
<span class="material-symbols-outlined text-outline" data-icon="expand_more">expand_more</span>
</button>
</section>
<!-- PHOTO (OPTIONAL) -->
<section>
<h3 class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-4">Photo (Optional)</h3>
<div class="relative group">
<div class="w-full h-32 border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center bg-surface-container-low group-hover:bg-surface-container-lowest transition-colors cursor-pointer">
<span class="material-symbols-outlined text-on-surface-variant text-3xl mb-1" data-icon="add_a_photo">add_a_photo</span>
<span class="text-xs font-body text-on-surface-variant">Upload evidence</span>
</div>
</div>
</section>
<!-- Submit Entry Button -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-white rounded-xl font-headline font-bold text-lg shadow-lg shadow-primary/30 active:scale-95 transition-all mt-4 mb-12">
                Submit Entry
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full rounded-t-2xl z-50 bg-white dark:bg-slate-950 border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_12px_rgba(0,0,0,0.03)]">
<div class="flex justify-around items-center w-full px-4 pb-6 pt-3">
<!-- Active Tab: Log Entry -->
<a class="flex flex-col items-center justify-center bg-green-100 dark:bg-green-900/40 text-green-800 dark:text-green-200 rounded-xl px-5 py-1.5 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-inter text-[11px] font-semibold uppercase tracking-wider mt-1">Log Entry</span>
</a>
<!-- History -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-1.5 hover:text-green-600 dark:hover:text-green-300 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-inter text-[11px] font-semibold uppercase tracking-wider mt-1">History</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-1.5 hover:text-green-600 dark:hover:text-green-300 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-inter text-[11px] font-semibold uppercase tracking-wider mt-1">Profile</span>
</a>
</div>
</nav>
</body></html>
